<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Students - EduTrack Admin</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
<div class="app-layout">
    <div th:replace="~{fragments/sidebar :: admin-sidebar}"></div>

    <div class="main-content">
        <div class="topbar">
            <div class="topbar-title">
                <h2>Students</h2>
                <p>Manage all student records</p>
            </div>
            <div class="topbar-actions">
                <a href="/admin/students/add" class="btn btn-primary">
                    <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
                    Add Student
                </a>
            </div>
        </div>

        <div class="page-content">
            <div th:if="${success}" class="alert alert-success" th:text="${success}"></div>
            <div th:if="${error}" class="alert alert-danger" th:text="${error}"></div>

            <div class="card">
                <div class="card-header">
                    <h3>All Students (<span th:text="${students.size()}">0</span>)</h3>
                </div>

                <!-- No students -->
                <div th:if="${students.empty}" class="empty-state">
                    <svg xmlns="http://www.w3.org/2000/svg" width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/></svg>
                    <h3>No students yet</h3>
                    <p>Click "Add Student" to get started.</p>
                </div>

                <!-- Students table -->
                <div th:if="${!students.empty}" class="table-wrapper">
                    <table>
                        <thead>
                        <tr>
                            <th>#</th>
                            <th>Name</th>
                            <th>Class</th>
                            <th>Roll Number</th>
                            <th>Email</th>
                            <th>Username</th>
                            <th>Actions</th>
                        </tr>
                        </thead>
                        <tbody>
                        <tr th:each="student, stat : ${students}">
                            <td th:text="${stat.count}">1</td>
                            <td style="font-weight:500;" th:text="${student.name}">Student Name</td>
                            <td>
                                <span class="badge badge-student" th:text="${student.className}">Class</span>
                            </td>
                            <td th:text="${student.rollNumber ?: '-'}">Roll</td>
                            <td th:text="${student.email ?: '-'}">Email</td>
                            <td>
                                <code th:text="${student.user != null ? student.user.username : '-'}">username</code>
                            </td>
                            <td>
                                <a th:href="@{/admin/students/edit/{id}(id=${student.id})}"
                                   class="btn btn-warning btn-sm">Edit</a>
                                <a th:href="@{/admin/students/delete/{id}(id=${student.id})}"
                                   class="btn btn-danger btn-sm"
                                   onclick="return confirm('Delete this student? This cannot be undone.')">Delete</a>
                            </td>
                        </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>
</div>
</body>
</html>
