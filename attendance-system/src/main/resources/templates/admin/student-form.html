<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Student Form - EduTrack</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
<div class="app-layout">
    <div th:replace="~{fragments/sidebar :: admin-sidebar}"></div>

    <div class="main-content">
        <div class="topbar">
            <div class="topbar-title">
                <h2>Student Form</h2>
                <p>Add or edit student details</p>
            </div>
        </div>

        <div class="page-content">
            <div th:if="${error}" class="alert alert-danger" th:text="${error}"></div>
            <div th:if="${success}" class="alert alert-success" th:text="${success}"></div>

            <div class="card" style="max-width:680px;">
                <div class="card-header">
                    <h3>Student Details</h3>
                </div>
                <div class="card-body">

                    <!-- ADD FORM: shown when editMode is null or false -->
                    <div th:if="${editMode == null or editMode == false}">
                        <form th:action="@{/admin/students/save}" method="post">
                            <div class="form-grid">
                                <div class="form-group">
                                    <label class="form-label">Full Name *</label>
                                    <input type="text" name="name" class="form-control"
                                           placeholder="e.g. Arjun Sharma" required>
                                </div>
                                <div class="form-group">
                                    <label class="form-label">Class *</label>
                                    <input type="text" name="className" class="form-control"
                                           placeholder="e.g. CS-3A" required>
                                </div>
                                <div class="form-group">
                                    <label class="form-label">Roll Number</label>
                                    <input type="text" name="rollNumber" class="form-control"
                                           placeholder="e.g. CS2024001">
                                </div>
                                <div class="form-group">
                                    <label class="form-label">Email</label>
                                    <input type="email" name="email" class="form-control"
                                           placeholder="student@example.com">
                                </div>
                            </div>
                            <hr style="border:none; border-top:1px solid var(--border); margin:16px 0;">
                            <p style="font-size:13px;font-weight:600;color:var(--text-muted);margin-bottom:16px;text-transform:uppercase;letter-spacing:.05em;">
                                Login Credentials
                            </p>
                            <div class="form-grid">
                                <div class="form-group">
                                    <label class="form-label">Username *</label>
                                    <input type="text" name="username" class="form-control"
                                           placeholder="e.g. arjun.sharma" required autocomplete="off">
                                </div>
                                <div class="form-group">
                                    <label class="form-label">Password *</label>
                                    <input type="password" name="password" class="form-control"
                                           placeholder="Min 6 characters" required minlength="6"
                                           autocomplete="new-password">
                                </div>
                            </div>
                            <div class="form-actions">
                                <button type="submit" class="btn btn-primary">Save Student</button>
                                <a href="/admin/students" class="btn btn-secondary">Cancel</a>
                            </div>
                        </form>
                    </div>

                    <!-- EDIT FORM: shown when editMode is true -->
                    <div th:if="${editMode == true}">
                        <form th:action="@{/admin/students/update/{id}(id=${student.id})}" method="post">
                            <div class="form-grid">
                                <div class="form-group">
                                    <label class="form-label">Full Name *</label>
                                    <input type="text" name="name" class="form-control"
                                           th:value="${student.name}" required>
                                </div>
                                <div class="form-group">
                                    <label class="form-label">Class *</label>
                                    <input type="text" name="className" class="form-control"
                                           th:value="${student.className}" required>
                                </div>
                                <div class="form-group">
                                    <label class="form-label">Roll Number</label>
                                    <input type="text" name="rollNumber" class="form-control"
                                           th:value="${student.rollNumber}">
                                </div>
                                <div class="form-group">
                                    <label class="form-label">Email</label>
                                    <input type="email" name="email" class="form-control"
                                           th:value="${student.email}">
                                </div>
                            </div>
                            <div class="form-actions">
                                <button type="submit" class="btn btn-primary">Update Student</button>
                                <a href="/admin/students" class="btn btn-secondary">Cancel</a>
                            </div>
                        </form>
                    </div>

                </div>
            </div>
        </div>
    </div>
</div>
</body>
</html>
