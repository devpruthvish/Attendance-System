<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Subject Form - EduTrack</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
<div class="app-layout">
    <div th:replace="~{fragments/sidebar :: admin-sidebar}"></div>
    <div class="main-content">
        <div class="topbar">
            <div class="topbar-title">
                <h2>Subject Form</h2>
                <p>Add or edit subject details</p>
            </div>
        </div>
        <div class="page-content">
            <div th:if="${error}" class="alert alert-danger" th:text="${error}"></div>
            <div class="card" style="max-width:580px;">
                <div class="card-header"><h3>Subject Details</h3></div>
                <div class="card-body">

                    <!-- ADD FORM -->
                    <div th:if="${editMode == null or editMode == false}">
                        <form th:action="@{/admin/subjects/save}" method="post">
                            <div class="form-grid">
                                <div class="form-group">
                                    <label class="form-label">Subject Name *</label>
                                    <input type="text" name="name" class="form-control" placeholder="e.g. Data Structures" required>
                                </div>
                                <div class="form-group">
                                    <label class="form-label">Subject Code</label>
                                    <input type="text" name="code" class="form-control" placeholder="e.g. CS301">
                                </div>
                                <div class="form-group">
                                    <label class="form-label">Class *</label>
                                    <input type="text" name="className" class="form-control" placeholder="e.g. CS-3A" required>
                                </div>
                                <div class="form-group">
                                    <label class="form-label">Assign Teacher</label>
                                    <select name="teacherId" class="form-control">
                                        <option value="">-- Select Teacher --</option>
                                        <option th:each="t : ${teachers}" th:value="${t.id}" th:text="${t.name}"></option>
                                    </select>
                                </div>
                            </div>
                            <div class="form-actions">
                                <button type="submit" class="btn btn-primary">Save Subject</button>
                                <a href="/admin/subjects" class="btn btn-secondary">Cancel</a>
                            </div>
                        </form>
                    </div>

                    <!-- EDIT FORM -->
                    <div th:if="${editMode == true}">
                        <form th:action="@{/admin/subjects/update/{id}(id=${subject.id})}" method="post">
                            <div class="form-grid">
                                <div class="form-group">
                                    <label class="form-label">Subject Name *</label>
                                    <input type="text" name="name" class="form-control" th:value="${subject.name}" required>
                                </div>
                                <div class="form-group">
                                    <label class="form-label">Subject Code</label>
                                    <input type="text" name="code" class="form-control" th:value="${subject.code}">
                                </div>
                                <div class="form-group">
                                    <label class="form-label">Class *</label>
                                    <input type="text" name="className" class="form-control" th:value="${subject.className}" required>
                                </div>
                                <div class="form-group">
                                    <label class="form-label">Assign Teacher</label>
                                    <select name="teacherId" class="form-control">
                                        <option value="">-- Select Teacher --</option>
                                        <option th:each="t : ${teachers}"
                                                th:value="${t.id}"
                                                th:text="${t.name}"
                                                th:selected="${subject.teacher != null and subject.teacher.id == t.id}">
                                        </option>
                                    </select>
                                </div>
                            </div>
                            <div class="form-actions">
                                <button type="submit" class="btn btn-primary">Update Subject</button>
                                <a href="/admin/subjects" class="btn btn-secondary">Cancel</a>
                            </div>
                        </form>
                    </div>

                </div>
            </div>
        </div>
    </div>
</div>
</body>
</html>
