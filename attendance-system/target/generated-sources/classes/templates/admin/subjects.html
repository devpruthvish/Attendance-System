<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Subjects - EduTrack Admin</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
<div class="app-layout">
    <div th:replace="~{fragments/sidebar :: admin-sidebar}"></div>

    <div class="main-content">
        <div class="topbar">
            <div class="topbar-title">
                <h2>Subjects</h2>
                <p>Manage subjects and teacher assignments</p>
            </div>
            <div class="topbar-actions">
                <a href="/admin/subjects/add" class="btn btn-primary">
                    <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
                    Add Subject
                </a>
            </div>
        </div>

        <div class="page-content">
            <div th:if="${success}" class="alert alert-success" th:text="${success}"></div>
            <div th:if="${error}" class="alert alert-danger" th:text="${error}"></div>

            <div class="card">
                <div class="card-header">
                    <h3>All Subjects (<span th:text="${subjects.size()}">0</span>)</h3>
                </div>

                <div th:if="${subjects.empty}" class="empty-state">
                    <svg xmlns="http://www.w3.org/2000/svg" width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M2 3h6a4 4 0 0 1 4 4v14a3 3 0 0 0-3-3H2z"/><path d="M22 3h-6a4 4 0 0 0-4 4v14a3 3 0 0 1 3-3h7z"/></svg>
                    <h3>No subjects yet</h3>
                    <p>Click "Add Subject" to get started.</p>
                </div>

                <div th:if="${!subjects.empty}" class="table-wrapper">
                    <table>
                        <thead>
                        <tr>
                            <th>#</th>
                            <th>Subject Name</th>
                            <th>Code</th>
                            <th>Class</th>
                            <th>Assigned Teacher</th>
                            <th>Actions</th>
                        </tr>
                        </thead>
                        <tbody>
                        <tr th:each="subject, stat : ${subjects}">
                            <td th:text="${stat.count}">1</td>
                            <td style="font-weight:500;" th:text="${subject.name}">Subject</td>
                            <td><code th:text="${subject.code ?: '-'}">CODE</code></td>
                            <td>
                                <span class="badge badge-student" th:text="${subject.className ?: '-'}">Class</span>
                            </td>
                            <td>
                                <span th:if="${subject.teacher != null}"
                                      class="badge badge-teacher"
                                      th:text="${subject.teacher.name}">Teacher</span>
                                <span th:if="${subject.teacher == null}"
                                      style="color:var(--text-muted); font-size:13px;">Unassigned</span>
                            </td>
                            <td>
                                <a th:href="@{/admin/subjects/edit/{id}(id=${subject.id})}"
                                   class="btn btn-warning btn-sm">Edit</a>
                                <a th:href="@{/admin/subjects/delete/{id}(id=${subject.id})}"
                                   class="btn btn-danger btn-sm"
                                   onclick="return confirm('Delete this subject?')">Delete</a>
                            </td>
                        </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>
</div>
</body>
</html>
